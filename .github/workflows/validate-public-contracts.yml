name: Validate public contracts

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate schemas, examples, and intake form guardrails
        run: |
          python3 -m venv .venv
          .venv/bin/python -m pip install --disable-pip-version-check --requirement requirements-dev.txt
          .venv/bin/python scripts/validate_schemas.py
